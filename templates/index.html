<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F4EF;
      --surface: #FFFFFF;
      --border: #E2DDD6;
      --text-primary: #1A1714;
      --text-secondary: #6B6560;
      --text-muted: #A09A94;

      /* Accents principaux */
      --violet: #9B7FD4;
      --violet-light: #EDE8F8;
      --violet-mid: #C4B0E8;
      --green: #7DC4A0;
      --green-light: #E8F5EE;
      --green-mid: #B0DCC3;

      /* Urgence tram */
      --urgency-red: #E53935;
      --urgency-red-bg: #FFEBEE;
      --urgency-yellow: #F9A825;
      --urgency-yellow-bg: #FFFDE7;
      --urgency-green: #43A047;
      --urgency-green-bg: #E8F5E9;

      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: var(--font-body);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    header {
      display: flex; align-items: baseline;
      justify-content: space-between;
      padding: 13px 28px 11px;
      border-bottom: 2px solid var(--text-primary);
      background: var(--bg); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: baseline; gap: 14px; }
    .header-title {
      font-family: var(--font-display); font-size: 19px;
      font-weight: 900; letter-spacing: -0.5px;
    }
    .header-subtitle {
      font-size: 10px; font-weight: 500;
      color: var(--text-muted); letter-spacing: 2.5px; text-transform: uppercase;
    }
    .header-right { display: flex; align-items: baseline; gap: 18px; }
    #clock {
      font-family: var(--font-display); font-size: 25px;
      font-weight: 700; letter-spacing: -1px; line-height: 1;
    }
    #date-display { font-size: 12px; color: var(--text-secondary); text-transform: capitalize; }

    /* ══════════════════════════════════════
       GRID
    ══════════════════════════════════════ */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 280px 260px;
      grid-template-rows: 1fr 1fr 200px;
      overflow: hidden;
    }

    /* ══════════════════════════════════════
       WIDGET BASE
    ══════════════════════════════════════ */
    .widget {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex; flex-direction: column;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
    .widget:nth-child(1) { animation-delay: 0.05s; grid-row: 1/3; }
    .widget:nth-child(2) { animation-delay: 0.10s; }
    .widget:nth-child(3) { animation-delay: 0.15s; border-right: none; }
    .widget:nth-child(4) { animation-delay: 0.20s; grid-column: 2/4; border-right: none; }
    .widget:nth-child(5) { animation-delay: 0.25s; grid-column: 1/-1; border-right: none; border-bottom: none; background: var(--bg); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .widget-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .widget-label {
      font-size: 9px; font-weight: 500;
      letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-muted);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); animation: pulse 2s infinite;
    }
    .status-dot.off { background: var(--text-muted); animation: none; }
    .status-dot.error { background: var(--urgency-red); animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .widget-body {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--violet-mid); border-radius: 2px; }
    .loading { color: var(--text-muted); font-size: 11px; font-style: italic; }

    /* ══════════════════════════════════════
       MÉTÉO
    ══════════════════════════════════════ */
    #widget-weather .widget-body {
      display: flex; flex-direction: column; padding: 10px 16px;
    }
    .weather-main {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .weather-temp-block { display: flex; flex-direction: column; }
    .weather-temp {
      font-family: var(--font-display); font-size: 42px;
      font-weight: 700; line-height: 1; letter-spacing: -2px;
    }
    .weather-feels { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .weather-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-weight: 500; }
    .weather-icon-wrap { width: 70px; height: 70px; position: relative; flex-shrink: 0; }

    /* Soleil */
    .icon-sun {
      width: 36px; height: 36px; border-radius: 50%; background: #FFB800;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: sunPulse 2s ease-in-out infinite;
    }
    .icon-sun::before {
      content: ''; position: absolute; inset: -12px; border-radius: 50%;
      box-shadow: 0 -18px 0 3px #FFB800, 0 18px 0 3px #FFB800,
        -18px 0 0 3px #FFB800, 18px 0 0 3px #FFB800,
        -13px -13px 0 3px #FFB800, 13px -13px 0 3px #FFB800,
        -13px 13px 0 3px #FFB800, 13px 13px 0 3px #FFB800;
      animation: sunRotate 8s linear infinite;
    }
    @keyframes sunPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,184,0,.4)} 50%{box-shadow:0 0 0 8px rgba(255,184,0,0)} }
    @keyframes sunRotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* Nuage */
    .icon-cloud { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); animation:cloudFloat 3s ease-in-out infinite; }
    .cloud-body { width:50px; height:22px; background:#C8D6E5; border-radius:11px; position:relative; }
    .cloud-body::before { content:''; position:absolute; width:24px; height:24px; border-radius:50%; background:#C8D6E5; top:-12px; left:8px; }
    .cloud-body::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#C8D6E5; top:-8px; left:22px; }
    @keyframes cloudFloat { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-50%,calc(-50% - 4px))} }

    /* Pluie */
    .icon-rain { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
    .rain-cloud { width:48px; height:20px; background:#90A4B4; border-radius:10px; position:relative; margin-bottom:6px; }
    .rain-cloud::before { content:''; position:absolute; width:22px; height:22px; border-radius:50%; background:#90A4B4; top:-11px; left:6px; }
    .rain-cloud::after { content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#90A4B4; top:-8px; left:20px; }
    .rain-drops { display:flex; gap:6px; padding-left:4px; }
    .rain-drop { width:2px; height:8px; border-radius:1px; background:#009FE3; animation:rainFall 1s ease-in infinite; }
    .rain-drop:nth-child(2){animation-delay:.2s} .rain-drop:nth-child(3){animation-delay:.4s}
    .rain-drop:nth-child(4){animation-delay:.1s} .rain-drop:nth-child(5){animation-delay:.3s}
    @keyframes rainFall { 0%{opacity:0;transform:translateY(-4px)} 50%{opacity:1} 100%{opacity:0;transform:translateY(8px)} }

    /* Orage */
    .icon-thunder { position:absolute; top:50%; left:50%; transform:translate(-50%,-55%); }
    .thunder-cloud { width:48px; height:20px; background:#607080; border-radius:10px; position:relative; margin-bottom:4px; }
    .thunder-cloud::before { content:''; position:absolute; width:22px; height:22px; border-radius:50%; background:#607080; top:-11px; left:6px; }
    .thunder-cloud::after { content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#607080; top:-8px; left:20px; }
    .thunder-bolt { font-size:22px; text-align:center; color:#FFB800; animation:thunderFlash 2s ease-in-out infinite; }
    @keyframes thunderFlash { 0%,100%{opacity:1} 40%{opacity:.3} 50%{opacity:1} 60%{opacity:.2} 70%{opacity:1} }

    /* Neige */
    .icon-snow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
    .snow-cloud { width:48px; height:20px; background:#B0C4D4; border-radius:10px; position:relative; margin-bottom:6px; }
    .snow-cloud::before { content:''; position:absolute; width:22px; height:22px; border-radius:50%; background:#B0C4D4; top:-11px; left:6px; }
    .snow-cloud::after { content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:#B0C4D4; top:-8px; left:20px; }
    .snow-flakes { display:flex; gap:7px; padding-left:3px; }
    .snow-flake { font-size:10px; animation:snowFall 1.5s ease-in-out infinite; }
    .snow-flake:nth-child(2){animation-delay:.3s} .snow-flake:nth-child(3){animation-delay:.6s} .snow-flake:nth-child(4){animation-delay:.9s}
    @keyframes snowFall { 0%,100%{opacity:0;transform:translateY(-3px)} 50%{opacity:1;transform:translateY(4px)} }

    /* Nuit */
    .icon-night { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:38px; animation:moonGlow 3s ease-in-out infinite; }
    @keyframes moonGlow { 0%,100%{filter:drop-shadow(0 0 4px rgba(255,220,100,.3))} 50%{filter:drop-shadow(0 0 12px rgba(255,220,100,.7))} }

    /* Partiellement nuageux */
    .icon-partly { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
    .partly-sun { width:28px; height:28px; border-radius:50%; background:#FFB800; position:absolute; top:2px; left:2px; animation:sunPulse 2s ease-in-out infinite; }
    .partly-cloud { width:42px; height:18px; background:#D4E0EA; border-radius:9px; position:absolute; bottom:2px; right:0; }
    .partly-cloud::before { content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:#D4E0EA; top:-10px; left:6px; }
    .partly-cloud::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#D4E0EA; top:-7px; left:18px; }

    .weather-stats { display:flex; gap:12px; margin-bottom:10px; }
    .weather-stat { display:flex; align-items:center; gap:4px; }
    .weather-stat-icon { font-size:11px; }
    .weather-stat-val { font-size:11px; color:var(--text-secondary); font-family:var(--font-mono); }

    .weather-forecast { display:flex; border-top:1px solid var(--border); padding-top:8px; margin-top:2px; }
    .forecast-day { flex:1; text-align:center; padding:4px 2px; border-right:1px solid var(--border); }
    .forecast-day:last-child { border-right:none; }
    .forecast-label { font-size:9px; color:var(--text-muted); letter-spacing:.5px; margin-bottom:4px; }
    .forecast-icon { font-size:14px; margin-bottom:3px; }
    .forecast-temps { font-size:10px; font-family:var(--font-mono); }
    .forecast-max { color:var(--violet); }
    .forecast-min { color:var(--text-muted); }

    /* ══════════════════════════════════════
       TRAM
    ══════════════════════════════════════ */
    .tram-stop-name { font-size:10px; color:var(--text-secondary); margin-bottom:8px; }
    .tram-passage {
      display:flex; align-items:center; justify-content:space-between;
      padding:7px 0; border-bottom:1px solid var(--border);
      transition: background 0.15s;
    }
    .tram-passage:last-child { border-bottom:none; }
    .tram-passage:hover { background: var(--violet-light); margin:0 -16px; padding:7px 16px; border-radius:4px; }
    .tram-left { display:flex; align-items:center; gap:9px; }

    /* Badge de ligne avec couleur officielle */
    .tram-line-badge {
      display:inline-flex; align-items:center; justify-content:center;
      width:26px; height:26px; border-radius:6px;
      color:white; font-size:12px; font-weight:700;
      font-family:var(--font-mono); flex-shrink:0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }
    .tram-direction { font-size:11px; font-weight:500; }
    .tram-realtime { font-size:9px; color:var(--green); }
    .tram-theoretical { font-size:9px; color:var(--text-muted); }

    /* Minutage avec couleur d'urgence */
    .tram-minutes {
      font-family:var(--font-mono); font-size:15px; font-weight:700;
      text-align:right; padding:3px 7px; border-radius:5px;
    }
    .tram-minutes.urgent  { color:var(--urgency-red);    background:var(--urgency-red-bg); }
    .tram-minutes.warning { color:var(--urgency-yellow); background:var(--urgency-yellow-bg); }
    .tram-minutes.ok      { color:var(--urgency-green);  background:var(--urgency-green-bg); }
    .tram-time-label { font-size:10px; color:var(--text-muted); text-align:right; margin-top:2px; }

    /* ══════════════════════════════════════
       ACTUALITÉS IA
    ══════════════════════════════════════ */
    .news-item {
      display:flex; gap:11px; padding:9px 0;
      border-bottom:1px solid var(--border);
      transition:background 0.15s; cursor:pointer;
      text-decoration:none; color:inherit;
    }
    .news-item:last-child { border-bottom:none; }
    .news-item:hover { background:var(--green-light); margin:0 -16px; padding:9px 16px; border-radius:4px; }

    /* Icône domaine */
    .news-icon {
      width:32px; height:32px; border-radius:8px;
      background:var(--violet-light);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0;
      border:1px solid var(--violet-mid);
    }
    .news-content { flex:1; min-width:0; }
    .news-source-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
    .news-source {
      font-size:9px; font-weight:600; letter-spacing:1.5px;
      text-transform:uppercase; color:var(--violet);
    }
    .news-time { font-size:10px; color:var(--text-muted); font-family:var(--font-mono); }
    .news-title { font-size:12px; font-weight:600; line-height:1.35; margin-bottom:2px; }
    .news-summary { font-size:11px; color:var(--text-secondary); line-height:1.4;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ══════════════════════════════════════
       CALENDRIER
    ══════════════════════════════════════ */
    #widget-calendar .widget-body { padding:10px 16px; }
    .cal-events-title {
      font-size:9px; font-weight:500; letter-spacing:2px;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:8px;
    }
    .cal-event-item {
      display:flex; align-items:flex-start; gap:8px;
      padding:5px 0; border-bottom:1px solid var(--border);
    }
    .cal-event-item:last-child { border-bottom:none; }
    .cal-event-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--violet); margin-top:4px; flex-shrink:0;
    }
    .cal-event-title { font-size:12px; font-weight:500; flex:1; }
    .cal-event-time { font-size:10px; color:var(--text-muted); font-family:var(--font-mono); }
    .cal-event-del {
      font-size:13px; color:var(--text-muted); cursor:pointer;
      opacity:0; transition:opacity 0.15s; background:none; border:none; padding:0;
    }
    .cal-event-item:hover .cal-event-del { opacity:1; }

    hr.cal-divider { border:none; border-top:1px solid var(--border); margin:10px 0 8px; }
    .cal-week-title {
      font-size:9px; font-weight:500; letter-spacing:2px;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:6px;
    }
    .cal-week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
    .cal-week-day-name { font-size:9px; color:var(--text-muted); text-align:center; padding:2px 0; }
    .cal-week-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:11px; border-radius:4px; }
    .cal-week-day.today { background:var(--violet); color:white; font-weight:700; border-radius:50%; }

    .cal-add-btn {
      display:flex; align-items:center; justify-content:center; gap:5px;
      background:none; border:1px solid var(--border); border-radius:5px;
      padding:5px 10px; width:100%; font-family:var(--font-body); font-size:11px;
      color:var(--text-secondary); cursor:pointer; transition:all 0.15s; margin-top:8px;
    }
    .cal-add-btn:hover { border-color:var(--green); color:var(--green); background:var(--green-light); }

    /* ══════════════════════════════════════
       MODAL
    ══════════════════════════════════════ */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.2); z-index:100;
      align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:white; border-radius:12px; padding:24px; width:320px;
      box-shadow:0 20px 60px rgba(0,0,0,0.12);
    }
    .modal-title { font-family:var(--font-display); font-size:17px; font-weight:700; margin-bottom:16px; }
    .modal-field { margin-bottom:12px; }
    .modal-field label {
      display:block; font-size:10px; color:var(--text-muted);
      margin-bottom:4px; letter-spacing:1px; text-transform:uppercase;
    }
    .modal-field input {
      width:100%; border:1px solid var(--border); border-radius:6px;
      padding:7px 11px; font-family:var(--font-body); font-size:13px;
      color:var(--text-primary); outline:none; transition:border-color 0.15s;
    }
    .modal-field input:focus { border-color:var(--violet); }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
    .btn-cancel {
      background:none; border:1px solid var(--border); border-radius:6px;
      padding:6px 14px; font-family:var(--font-body); font-size:12px;
      color:var(--text-secondary); cursor:pointer;
    }
    .btn-save {
      background:var(--violet); border:none; border-radius:6px;
      padding:6px 14px; font-family:var(--font-body); font-size:12px;
      color:white; cursor:pointer; transition:background 0.15s;
    }
    .btn-save:hover { background:var(--green); }

    /* ══════════════════════════════════════
       TODO
    ══════════════════════════════════════ */
    #widget-todo .widget-body { display:flex; flex-direction:column; padding:0 16px; }
    .todo-input-row {
      display:flex; align-items:center; gap:8px;
      padding:9px 0; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    #todo-input {
      flex:1; border:none; background:transparent;
      font-family:var(--font-body); font-size:12px; color:var(--text-primary); outline:none;
    }
    #todo-input::placeholder { color:var(--text-muted); }
    .todo-add-btn {
      background:var(--violet); color:white; border:none; border-radius:4px;
      width:20px; height:20px; font-size:15px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s; flex-shrink:0;
    }
    .todo-add-btn:hover { background:var(--green); }
    .todo-list {
      flex:1; overflow-y:auto; display:flex;
      flex-wrap:wrap; align-content:flex-start;
    }
    .todo-item {
      display:flex; align-items:center; gap:8px;
      padding:7px 12px 7px 0; width:25%;
      border-right:1px solid var(--border); cursor:pointer;
      transition:background 0.12s; border-radius:0;
    }
    .todo-item:nth-child(4n) { border-right:none; }
    .todo-item:hover { background:var(--violet-light); }
    .todo-checkbox {
      width:14px; height:14px; border:1.5px solid var(--border);
      border-radius:3px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s;
    }
    .todo-item.done .todo-checkbox { background:var(--green); border-color:var(--green); }
    .todo-item.done .todo-checkbox::after { content:'✓'; color:white; font-size:9px; }
    .todo-text { font-size:12px; line-height:1.3; flex:1; }
    .todo-item.done .todo-text { text-decoration:line-through; color:var(--text-muted); }
    .todo-delete { color:var(--text-muted); font-size:13px; opacity:0; transition:opacity 0.15s; cursor:pointer; }
    .todo-item:hover .todo-delete { opacity:1; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-title">MON DASHBOARD</span>
    <span class="header-subtitle">Montpellier</span>
  </div>
  <div class="header-right">
    <span id="date-display"></span>
    <span id="clock"></span>
  </div>
</header>

<main>

  <!-- ACTUALITÉS IA -->
  <div class="widget" id="widget-twitter">
    <div class="widget-header">
      <span class="widget-label">— Actualités IA</span>
      <div class="status-dot off" id="news-status"></div>
    </div>
    <div class="widget-body" id="news-feed">
      <p class="loading">Chargement…</p>
    </div>
  </div>

  <!-- MÉTÉO -->
  <div class="widget" id="widget-weather">
    <div class="widget-header">
      <span class="widget-label">— Météo Montpellier</span>
      <div class="status-dot" id="weather-status"></div>
    </div>
    <div class="widget-body" id="weather-data">
      <p class="loading">Chargement…</p>
    </div>
  </div>

  <!-- TRAM -->
  <div class="widget" id="widget-tram">
    <div class="widget-header">
      <span class="widget-label">— Tramway TAM</span>
      <div class="status-dot" id="tram-status"></div>
    </div>
    <div class="widget-body" id="tram-data">
      <p class="tram-stop-name">Albert I — Jardin des plantes</p>
      <p class="loading">Chargement…</p>
    </div>
  </div>

  <!-- CALENDRIER -->
  <div class="widget" id="widget-calendar">
    <div class="widget-header">
      <span class="widget-label">— Calendrier</span>
      <div class="status-dot" id="cal-status"></div>
    </div>
    <div class="widget-body" id="calendar-body"></div>
  </div>

  <!-- TODO -->
  <div class="widget" id="widget-todo">
    <div class="widget-header">
      <span class="widget-label">— Tâches</span>
      <span id="todo-count" style="font-size:10px; color:var(--text-muted); font-family:var(--font-mono);"></span>
    </div>
    <div class="widget-body">
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Ajouter une tâche…" />
        <button class="todo-add-btn" onclick="addTodo()">+</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
    </div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Nouvel événement</div>
    <div class="modal-field">
      <label>Titre</label>
      <input type="text" id="event-title" placeholder="Ex: Réunion équipe" />
    </div>
    <div class="modal-field">
      <label>Date et heure</label>
      <input type="datetime-local" id="event-date" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// HORLOGE
// ══════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

// ══════════════════════════════════════
// MÉTÉO
// ══════════════════════════════════════
const WMO_LABELS = {
  0:'Ciel dégagé', 1:'Peu nuageux', 2:'Partiellement nuageux', 3:'Couvert',
  45:'Brouillard', 48:'Brouillard givrant',
  51:'Bruine légère', 53:'Bruine', 55:'Bruine forte',
  61:'Pluie légère', 63:'Pluie', 65:'Pluie forte',
  71:'Neige légère', 73:'Neige', 75:'Neige forte',
  80:'Averses légères', 81:'Averses', 82:'Averses fortes',
  95:'Orage', 96:'Orage avec grêle', 99:'Orage violent'
};

function getWeatherIcon(code, animated=true) {
  const h = new Date().getHours();
  const isNight = h < 6 || h >= 21;
  if (!animated) {
    if (code === 0) return isNight ? '🌙' : '☀️';
    if (code <= 2) return isNight ? '🌙' : '🌤';
    if (code <= 3) return '☁️';
    if (code <= 55) return '🌦';
    if (code <= 67) return '🌧';
    if (code <= 77) return '❄️';
    if (code <= 82) return '🌧';
    return '⛈';
  }
  if (code === 0 && isNight) return `<div class="icon-night">🌙</div>`;
  if (code === 0) return `<div class="icon-sun"></div>`;
  if (code <= 2) return `<div class="icon-partly"><div class="partly-sun"></div><div class="partly-cloud"></div></div>`;
  if (code <= 3) return `<div class="icon-cloud"><div class="cloud-body"></div></div>`;
  if (code <= 55) return `<div class="icon-rain"><div class="rain-cloud"></div><div class="rain-drops"><div class="rain-drop"></div><div class="rain-drop"></div><div class="rain-drop"></div><div class="rain-drop"></div><div class="rain-drop"></div></div></div>`;
  if (code <= 77) return `<div class="icon-snow"><div class="snow-cloud"></div><div class="snow-flakes"><div class="snow-flake">❄</div><div class="snow-flake">❄</div><div class="snow-flake">❄</div><div class="snow-flake">❄</div></div></div>`;
  if (code >= 95) return `<div class="icon-thunder"><div class="thunder-cloud"></div><div class="thunder-bolt">⚡</div></div>`;
  return `<div class="icon-rain"><div class="rain-cloud"></div><div class="rain-drops"><div class="rain-drop"></div><div class="rain-drop"></div><div class="rain-drop"></div></div></div>`;
}

async function loadWeather() {
  try {
    const res = await fetch('/api/weather');
    const d = await res.json();
    if (!d.temp && d.temp !== 0) return;
    const label = WMO_LABELS[d.code] || 'Conditions variables';
    const forecastHtml = d.forecast.map(f => `
      <div class="forecast-day">
        <div class="forecast-label">${f.day}</div>
        <div class="forecast-icon">${getWeatherIcon(f.code, false)}</div>
        <div class="forecast-temps">
          <span class="forecast-max">${f.max}°</span>
          <span class="forecast-min"> ${f.min}°</span>
        </div>
      </div>`).join('');
    document.getElementById('weather-data').innerHTML = `
      <div class="weather-main">
        <div class="weather-temp-block">
          <div class="weather-temp">${d.temp}°</div>
          <div class="weather-feels">Ressenti ${d.feels_like}°</div>
          <div class="weather-desc">${label}</div>
        </div>
        <div class="weather-icon-wrap">${getWeatherIcon(d.code)}</div>
      </div>
      <div class="weather-stats">
        <div class="weather-stat"><span class="weather-stat-icon">💧</span><span class="weather-stat-val">${d.humidity}%</span></div>
        <div class="weather-stat"><span class="weather-stat-icon">💨</span><span class="weather-stat-val">${d.wind} km/h</span></div>
      </div>
      <div class="weather-forecast">${forecastHtml}</div>`;
    document.getElementById('weather-status').classList.remove('off','error');
  } catch { document.getElementById('weather-status').classList.add('error'); }
}
loadWeather();
setInterval(loadWeather, 600000);

// ══════════════════════════════════════
// TRAM — avec couleurs TAM et urgence
// ══════════════════════════════════════
function minuteClass(min) {
  if (min <= 4)  return 'urgent';
  if (min <= 7)  return 'warning';
  return 'ok';
}

async function loadTram() {
  try {
    const res = await fetch('/api/tram');
    const data = await res.json();
    const container = document.getElementById('tram-data');
    const dot = document.getElementById('tram-status');
    if (!data.length) {
      container.innerHTML = `<p class="tram-stop-name">Albert I — Jardin des plantes</p><p class="loading">Aucun passage dans l'heure</p>`;
      dot.classList.add('error'); return;
    }
    dot.classList.remove('error');
    let html = `<p class="tram-stop-name">Albert I — Jardin des plantes</p>`;
    data.forEach(p => {
      const cls = minuteClass(p.minutes);
      const label = p.minutes === 0 ? 'À quai' : `${p.minutes} min`;
      html += `
        <div class="tram-passage">
          <div class="tram-left">
            <div class="tram-line-badge" style="background:${p.color}">${p.line}</div>
            <div>
              <div class="tram-direction">${p.direction}</div>
              <div class="${p.realtime ? 'tram-realtime' : 'tram-theoretical'}">${p.realtime ? '● temps réel' : '○ théorique'}</div>
            </div>
          </div>
          <div>
            <div class="tram-minutes ${cls}">${label}</div>
            <div class="tram-time-label">${p.time}</div>
          </div>
        </div>`;
    });
    container.innerHTML = html;
  } catch { document.getElementById('tram-status').classList.add('error'); }
}
loadTram();
setInterval(loadTram, 30000);

// ══════════════════════════════════════
// ACTUALITÉS IA
// ══════════════════════════════════════
async function loadNews() {
  try {
    const res = await fetch('/api/news');
    const articles = await res.json();
    const container = document.getElementById('news-feed');
    const dot = document.getElementById('news-status');
    if (!articles.length) {
      container.innerHTML = `<p class="loading">Aucun article récent disponible</p>`;
      return;
    }
    dot.classList.remove('off');
    container.innerHTML = articles.map(a => `
      <a class="news-item" href="${a.link}" target="_blank" rel="noopener">
        <div class="news-icon">${a.icon}</div>
        <div class="news-content">
          <div class="news-source-row">
            <span class="news-source">${a.source}</span>
            <span class="news-time">${a.time}</span>
          </div>
          <div class="news-title">${a.title}</div>
          <div class="news-summary">${a.summary}</div>
        </div>
      </a>`).join('');
  } catch { }
}
loadNews();
setInterval(loadNews, 120000);

// ══════════════════════════════════════
// CALENDRIER
// ══════════════════════════════════════
async function loadCalendar() {
  try {
    const res = await fetch('/api/events');
    renderCalendar(await res.json());
  } catch { renderCalendar([]); }
}

function renderCalendar(events) {
  const now = new Date();
  const body = document.getElementById('calendar-body');
  let html = `<div class="cal-events-title">À venir</div>`;
  if (!events.length) {
    html += `<p class="loading">Aucun événement — clique + pour en ajouter</p>`;
  } else {
    html += events.slice(0,5).map(e => `
      <div class="cal-event-item">
        <div class="cal-event-dot"></div>
        <div style="flex:1">
          <div class="cal-event-title">${e.title}</div>
          <div class="cal-event-time">${e.date}</div>
        </div>
        <button class="cal-event-del" onclick="deleteEvent('${e.id}')">×</button>
      </div>`).join('');
  }
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  html += `<hr class="cal-divider"><div class="cal-week-title">Cette semaine</div><div class="cal-week-grid">`;
  ['Lu','Ma','Me','Je','Ve','Sa','Di'].forEach(d => html += `<div class="cal-week-day-name">${d}</div>`);
  for (let i=0; i<7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    html += `<div class="cal-week-day ${d.toDateString()===now.toDateString()?'today':''}">${d.getDate()}</div>`;
  }
  html += `</div><button class="cal-add-btn" onclick="openModal()">+ Ajouter un événement</button>`;
  body.innerHTML = html;
}

async function deleteEvent(id) {
  await fetch(`/api/events/${id}`, {method:'DELETE'});
  loadCalendar();
}
loadCalendar();
setInterval(loadCalendar, 60000);

// ══════════════════════════════════════
// MODAL
// ══════════════════════════════════════
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  const now = new Date();
  now.setMinutes(Math.ceil(now.getMinutes()/15)*15);
  const local = new Date(now.getTime() - now.getTimezoneOffset()*60000);
  document.getElementById('event-date').value = local.toISOString().slice(0,16);
  document.getElementById('event-title').focus();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('event-title').value = '';
}
async function saveEvent() {
  const title = document.getElementById('event-title').value.trim();
  const date = document.getElementById('event-date').value;
  if (!title || !date) return;
  await fetch('/api/events', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,date})});
  closeModal(); loadCalendar();
}
document.getElementById('modal-overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ══════════════════════════════════════
// TODO
// ══════════════════════════════════════
let todos = [];
async function loadTodos() {
  try { todos = await (await fetch('/api/todos')).json(); } catch { todos=[]; }
  renderTodos();
}
async function saveTodos() {
  await fetch('/api/todos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(todos)});
}
function renderTodos() {
  const remaining = todos.filter(t=>!t.done).length;
  document.getElementById('todo-count').textContent =
    todos.length===0 ? '' : remaining===0 ? '✓ Tout fait' : `${remaining} restante${remaining>1?'s':''}`;
  document.getElementById('todo-list').innerHTML = todos.map((t,i)=>`
    <div class="todo-item ${t.done?'done':''}" onclick="toggleTodo(${i})">
      <div class="todo-checkbox"></div>
      <span class="todo-text">${t.text}</span>
      <span class="todo-delete" onclick="deleteTodo(event,${i})">×</span>
    </div>`).join('');
}
function addTodo() {
  const input = document.getElementById('todo-input');
  const text = input.value.trim();
  if (!text) return;
  todos.push({text, done:false});
  input.value='';
  saveTodos(); renderTodos();
}
function toggleTodo(i) { todos[i].done=!todos[i].done; saveTodos(); renderTodos(); }
function deleteTodo(e,i) { e.stopPropagation(); todos.splice(i,1); saveTodos(); renderTodos(); }
document.getElementById('todo-input').addEventListener('keydown', e => { if(e.key==='Enter') addTodo(); });
loadTodos();
</script>
</body>
</html>
