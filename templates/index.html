<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-title">MON DASHBOARD</span>
    <span class="header-subtitle">Montpellier</span>
  </div>
  <div class="header-center" id="widget-toggles"></div>
  <div class="header-right">
    <button class="btn-config" onclick="openConfig()">⚙ Configurer</button>
    <span id="date-display"></span>
    <span id="clock"></span>
  </div>
</header>

<main id="main-grid" class="layout-auto">

  <div class="widget" id="widget-twitter" data-size="m" data-label="Actualités IA">
    <div class="widget-header">
      <div class="widget-header-left">
        <span class="widget-label">— Actualités IA</span>
        <div class="status-dot off" id="news-status"></div>
      </div>
      <div class="widget-controls">
        <button class="wctrl" onclick="resizeWidget('widget-twitter','s')" title="Compact">−</button>
        <button class="wctrl" onclick="resizeWidget('widget-twitter','l')" title="Large">+</button>
        <button class="wctrl hide-btn" onclick="toggleWidget('widget-twitter')" title="Masquer">×</button>
      </div>
    </div>
    <div class="widget-body" id="news-feed"><p class="loading">Chargement…</p></div>
  </div>

  <div class="widget" id="widget-weather" data-size="m" data-label="Météo">
    <div class="widget-header">
      <div class="widget-header-left">
        <span class="widget-label">— Météo Montpellier</span>
        <div class="status-dot" id="weather-status"></div>
      </div>
      <div class="widget-controls">
        <button class="wctrl" onclick="resizeWidget('widget-weather','s')" title="Compact">−</button>
        <button class="wctrl" onclick="resizeWidget('widget-weather','l')" title="Large">+</button>
        <button class="wctrl hide-btn" onclick="toggleWidget('widget-weather')" title="Masquer">×</button>
      </div>
    </div>
    <div class="widget-body" id="weather-data"><p class="loading">Chargement…</p></div>
  </div>

  <div class="widget" id="widget-tram" data-size="m" data-label="Tram">
    <div class="widget-header">
      <div class="widget-header-left">
        <span class="widget-label">— Tramway TAM</span>
        <div class="status-dot" id="tram-status"></div>
      </div>
      <div class="widget-controls">
        <button class="wctrl" onclick="resizeWidget('widget-tram','s')" title="Compact">−</button>
        <button class="wctrl" onclick="resizeWidget('widget-tram','l')" title="Large">+</button>
        <button class="wctrl hide-btn" onclick="toggleWidget('widget-tram')" title="Masquer">×</button>
      </div>
    </div>
    <div class="widget-body" id="tram-data">
      <p class="tram-stop-name">Albert I — Jardin des plantes</p>
      <p class="loading">Chargement…</p>
    </div>
  </div>

  <div class="widget" id="widget-calendar" data-size="m" data-label="Calendrier">
    <div class="widget-header">
      <div class="widget-header-left">
        <span class="widget-label">— Calendrier</span>
        <div class="status-dot" id="cal-status"></div>
      </div>
      <div class="widget-controls">
        <button class="wctrl" onclick="resizeWidget('widget-calendar','s')" title="Compact">−</button>
        <button class="wctrl" onclick="resizeWidget('widget-calendar','l')" title="Large">+</button>
        <button class="wctrl hide-btn" onclick="toggleWidget('widget-calendar')" title="Masquer">×</button>
      </div>
    </div>
    <div class="widget-body" id="calendar-body"></div>
  </div>

  <div class="widget" id="widget-todo" data-size="m" data-label="Tâches">
    <div class="widget-header">
      <div class="widget-header-left">
        <span class="widget-label">— Tâches</span>
        <span id="todo-count" style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono);"></span>
      </div>
      <div class="widget-controls">
        <button class="wctrl" onclick="resizeWidget('widget-todo','s')" title="Compact">−</button>
        <button class="wctrl" onclick="resizeWidget('widget-todo','l')" title="Large">+</button>
        <button class="wctrl hide-btn" onclick="toggleWidget('widget-todo')" title="Masquer">×</button>
      </div>
    </div>
    <div class="widget-body">
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Ajouter une tâche…" maxlength="500" />
        <button class="todo-add-btn" onclick="addTodo()">+</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
    </div>
  </div>

</main>

<!-- Modal événement -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Nouvel événement</div>
    <div class="modal-field">
      <label>Titre</label>
      <input type="text" id="event-title" placeholder="Ex: Réunion équipe" maxlength="200" />
    </div>
    <div class="modal-field">
      <label>Date et heure</label>
      <input type="datetime-local" id="event-date" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Panel configurateur -->
<div id="config-panel">
  <div class="config-box">
    <div class="config-title">Configurer le dashboard</div>
    <div class="config-subtitle">Affichage, taille et layout de chaque bloc</div>
    <div class="config-section">Layout général</div>
    <div class="layout-btns">
      <button class="btn-layout" id="btn-layout-auto"    onclick="setLayout('auto')">Équilibré</button>
      <button class="btn-layout" id="btn-layout-news"    onclick="setLayout('news')">Large actualités</button>
      <button class="btn-layout" id="btn-layout-todo"    onclick="setLayout('todo')">Focus tâches</button>
      <button class="btn-layout" id="btn-layout-compact" onclick="setLayout('compact')">Compact</button>
    </div>
    <div class="config-section">Blocs</div>
    <div id="config-rows"></div>
    <button class="config-close" onclick="closeConfig()">Fermer</button>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
